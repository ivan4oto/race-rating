<div class="container" style="margin-top: 5%;">
  <img src="{{ user.imageUrl }}" alt="User Avatar" class="user-avatar" referrerpolicy="no-referrer">
  <h3>account type: {{ user.role }}</h3>
  <p>username: {{ user.username }}</p>
  <p>email: {{ user.email }}</p>
  <p>Ratings given: {{ user.votedForRaces.length }}</p>
  <p>Comments given: {{ user.commentedForRaces.length }}</p>
</div>
